# 斗地主服务端配置

server:
  # WebSocket 监听地址
  host: "0.0.0.0"
  port: 1780
  # 最大并发连接数（0 表示无限制）
  max_connections: 10000
  # 要求的最低客户端版本（如 "v1.2.0"），留空表示不限制。
  # 低于此版本的客户端启动时会被强制自动升级，用于发布不兼容变更时保证版本一致。
  min_client_version: "v0.4.1"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

game:
  # 玩家回合超时时间（秒）
  turn_timeout: 30
  # 叫地主超时时间（秒）
  bid_timeout: 15
  # 房间等待超时时间（分钟），超时自动解散
  room_timeout: 10
  # 优雅关闭超时时间（分钟），等待游戏结束的最长时间
  shutdown_timeout: 30 # 54张牌*30s出牌时间
  # 优雅关闭检测间隔（秒），检查游戏是否结束的频率
  shutdown_check_interval: 15 # 检查频率根据房间延迟清理调整
  # 游戏结束后关闭服务器延迟（秒），让玩家能返回游戏大厅看到维护通知
  room_cleanup_delay: 30

security:
  # 允许的来源（设置为 ["*"] 允许所有）
  allowed_origins:
    - "*"
  # 连接速率限制
  rate_limit:
    # 每秒最大连接数（per IP）
    max_per_second: 10
    # 每分钟最大连接数（per IP）
    max_per_minute: 60
    # 超限后封禁时长（秒）
    ban_duration: 60
  # 系统消息速率限制（per client）
  message_limit:
    # 每秒最大消息数
    max_per_second: 20

  # 聊天消息速率限制（per client）
  chat_limit:
    # 每秒最大聊天消息数
    max_per_second: 1
    # 每分钟最大聊天消息数
    max_per_minute: 30
    # 触发限流后的冷却时间（秒）
    cooldown: 5

ai:
  # 是否启用 AI 机器人（冷启动填充）
  enabled: true
  # 玩家等待多少秒后由 AI 填充剩余座位
  bot_fill_timeout: 15

  # --- DouZero 引擎 ---
  # 启用后使用 DouZero 神经网络引擎；关闭时使用内置规则启发式机器人（无外部依赖）
  douzero_enabled: true
  # Python DouZero 服务地址
  douzero_url: "http://localhost:2021"

# 通知配置（可选）
notification:
  # 小米音箱通知配置
  # 用于服务器关闭时发送语音通知
  # 参考: https://github.com/palemoky/xiaomi-speaker
  # 如果不需要，保持 url 为空即可
  xiaomi_speaker:
    # 小米音箱 API 地址（为空则不发送通知）
    url: ""
    # API 密钥
    api_secret: ""
    # Cloudflare 客户端 ID（可选）
    cf_client_id: ""
    # Cloudflare 客户端密钥（可选）
    cf_client_secret: ""
