syntax = "proto3";

package protocol;

import "common.proto";

message RoomCreatedPayload {
  string room_code = 1;
  PlayerInfo player = 2;
}

message RoomJoinedPayload {
  string room_code = 1;
  PlayerInfo player = 2;
  repeated PlayerInfo players = 3;
}

message PlayerJoinedPayload {
  PlayerInfo player = 1;
}

message PlayerLeftPayload {
  string player_id = 1;
  string player_name = 2;
}

message PlayerReadyPayload {
  string player_id = 1;
  bool ready = 2;
}

message GameStartPayload {
  repeated PlayerInfo players = 1;
}

message DealCardsPayload {
  repeated CardInfo cards = 1;
  repeated CardInfo bottom_cards = 2;
}

message BidTurnPayload {
  string player_id = 1;
  int64 timeout = 2;
  bool is_grab = 3;
  int64 multiplier = 4;
}

message BidResultPayload {
  string player_id = 1;
  string player_name = 2;
  bool bid = 3;
  bool is_grab = 4;
  int64 multiplier = 5;
}

message LandlordPayload {
  string player_id = 1;
  string player_name = 2;
  repeated CardInfo bottom_cards = 3;
  int64 multiplier = 4;
}

message PlayTurnPayload {
  string player_id = 1;
  int64 timeout = 2;
  bool must_play = 3;
  bool can_beat = 4;
}

message CardPlayedPayload {
  string player_id = 1;
  string player_name = 2;
  repeated CardInfo cards = 3;
  int64 cards_left = 4;
  string hand_type = 5;
}

message PlayerPassPayload {
  string player_id = 1;
  string player_name = 2;
}

message GameOverPayload {
  string winner_id = 1;
  string winner_name = 2;
  bool is_landlord = 3;
  repeated PlayerHand player_hands = 4;
  int64 multiplier = 5;
  repeated PlayerScore scores = 6;
}
