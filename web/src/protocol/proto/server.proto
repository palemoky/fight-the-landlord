syntax = "proto3";

package protocol;

import "common.proto";

message ConnectedPayload {
  string player_id = 1;
  string player_name = 2;
  string reconnect_token = 3;
}

message ReconnectedPayload {
  string player_id = 1;
  string player_name = 2;
  string room_code = 3;
  GameStateDTO game_state = 4;
}

message PongPayload {
  int64 client_timestamp = 1;
  int64 server_timestamp = 2;
}

message PlayerOfflinePayload {
  string player_id = 1;
  string player_name = 2;
  int64 timeout = 3;
}

message PlayerOnlinePayload {
  string player_id = 1;
  string player_name = 2;
}

message OnlineCountPayload {
  int64 count = 1;
}

message MaintenanceStatusPayload {
  bool maintenance = 1;
}

message MaintenancePayload {
  bool maintenance = 1;
}

message ErrorPayload {
  int64 code = 1;
  string message = 2;
}

message StatsResultPayload {
  string player_id = 1;
  string player_name = 2;
  int64 total_games = 3;
  int64 wins = 4;
  int64 losses = 5;
  double win_rate = 6;
  int64 landlord_games = 7;
  int64 landlord_wins = 8;
  int64 farmer_games = 9;
  int64 farmer_wins = 10;
  int64 score = 11;
  int64 rank = 12;
  int64 current_streak = 13;
  int64 max_win_streak = 14;
}

message LeaderboardResultPayload {
  string type = 1;
  repeated LeaderboardEntry entries = 2;
}

message RoomListResultPayload {
  repeated RoomListItem rooms = 1;
}

message ChatPayload {
  string sender_id = 1;
  string sender_name = 2;
  string content = 3;
  string scope = 4;
  int64 time = 5;
  bool is_system = 6;
}
