syntax = "proto3";

package protocol;

message CardInfo {
  int64 suit = 1;
  int64 rank = 2;
  int64 color = 3;
}

message PlayerInfo {
  string id = 1;
  string name = 2;
  int64 seat = 3;
  bool ready = 4;
  bool is_landlord = 5;
  int64 cards_count = 6;
  bool online = 7;
  bool is_bot = 8;
}

message PlayerHand {
  string player_id = 1;
  string player_name = 2;
  repeated CardInfo cards = 3;
}

message PlayerScore {
  string player_id = 1;
  string player_name = 2;
  bool is_landlord = 3;
  int64 score = 4;
}

message GameStateDTO {
  string phase = 1;
  repeated PlayerInfo players = 2;
  repeated CardInfo hand = 3;
  repeated CardInfo bottom_cards = 4;
  string current_turn = 5;
  repeated CardInfo last_played = 6;
  string last_player_id = 7;
  bool must_play = 8;
  bool can_beat = 9;
}

message LeaderboardEntry {
  int64 rank = 1;
  string player_id = 2;
  string player_name = 3;
  int64 score = 4;
  int64 wins = 5;
  double win_rate = 6;
}

message RoomListItem {
  string room_code = 1;
  int64 player_count = 2;
  int64 max_players = 3;
}
