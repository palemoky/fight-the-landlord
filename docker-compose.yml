services:
  # 游戏服务器
  poker-server:
    image: palemoky/fight-the-landlord:latest
    container_name: poker-server
    restart: unless-stopped
    stop_grace_period: ${GAME_SHUTDOWN_TIMEOUT:-30}m
    stop_signal: SIGTERM
    env_file: .env
    environment:
      - TZ=Asia/Shanghai
      - AI_DOUZERO_URL=http://douzero:2021
    ports:
      - "${SERVER_PORT:-1780}:1780"
    depends_on:
      redis:
        condition: service_healthy
      douzero:
        condition: service_healthy
    networks:
      - poker-network

  # DouZero AI 推理服务
  douzero:
    image: palemoky/fight-the-landlord-douzero:latest
    container_name: poker-douzero
    restart: unless-stopped
    networks:
      - poker-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2021/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Redis 数据库
  redis:
    image: redis:8-alpine
    container_name: poker-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - poker-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  poker-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
